<div class="admin-layout">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <header class="top-header">
      <div class="header-left">
        <a routerLink="/admin/exams" class="back-link"><i class="fas fa-arrow-left"></i>Back to Exams</a>
        <h1>Assign Users to Exam</h1>
        <p *ngIf="exam">{{ exam.title }}</p>
      </div>
    </header>
    <div class="page-content">
      <div class="split-view" *ngIf="!loading">
        <div class="panel">
          <div class="panel-header">
            <h2>Assigned Users ({{ assignedUsers.length }})</h2>
          </div>
          <div class="panel-body">
            <div class="user-list" *ngIf="assignedUsers.length > 0">
              <div class="user-card" *ngFor="let user of assignedUsers">
                <div class="user-info">
                  <div class="user-avatar"><i class="fas fa-user"></i></div>
                  <div class="user-details">
                    <span class="user-name">{{ user.name }}</span>
                    <span class="user-email">{{ user.email }}</span>
                  </div>
                </div>
                <button class="btn btn-sm btn-danger-outline" (click)="removeUser(user)" title="Remove">
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
            <p *ngIf="assignedUsers.length === 0" class="text-muted text-center">No users assigned yet</p>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <h2>Available Users</h2>
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input type="text" class="input" placeholder="Search users..." [(ngModel)]="searchTerm">
            </div>
          </div>
          <div class="panel-body">
            <div class="user-list" *ngIf="filteredAvailableUsers.length > 0">
              <ng-container *ngFor="let user of filteredAvailableUsers">
                <div class="user-card" *ngIf="user.is_active === true">
                  <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                      <span class="user-name">{{ user.name }}</span>
                      <span class="user-email">{{ user.email }}</span>
                    </div>
                  </div>
                  <button class="btn btn-sm btn-outline" (click)="assignUser(user)" title="Assign">
                    <i class="fas fa-plus"></i> Assign
                  </button>
                </div>
              </ng-container>
            </div>
            <p *ngIf="filteredAvailableUsers.length === 0" class="text-muted text-center">No available users</p>
          </div>
        </div>
      </div>
      <div class="loading" *ngIf="loading">
        <i class="fas fa-spinner fa-spin"></i> Loading...
      </div>
    </div>
  </main>
</div>
