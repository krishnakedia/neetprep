<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <i class="fas fa-graduation-cap"></i>
    </div>
    <h2>Gyan Vikash</h2>
  </div>
  
  <nav class="sidebar-nav">
    <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <i class="fas fa-home"></i>
      <span>Dashboard</span>
    </a>
    <a routerLink="/admin/users" routerLinkActive="active">
      <i class="fas fa-users"></i>
      <span>Users</span>
    </a>
    <a routerLink="/admin/subjects" routerLinkActive="active">
      <i class="fas fa-book"></i>
      <span>Subjects</span>
    </a>
    <a routerLink="/admin/exams" routerLinkActive="active">
      <i class="fas fa-file-alt"></i>
      <span>Exams</span>
    </a>
    <a routerLink="/admin/public-questions" routerLinkActive="active">
      <i class="fas fa-database"></i>
      <span>Public Questions</span>
    </a>
    <a routerLink="/admin/performance" routerLinkActive="active">
      <i class="fas fa-chart-bar"></i>
      <span>Performance</span>
    </a>
  </nav>
  
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">
        <i class="fas fa-user-shield"></i>
      </div>
      <div class="user-details">
        <span class="user-name">{{ currentUser?.name }}</span>
        <span class="user-role">Administrator</span>
      </div>
    </div>
    <button class="btn btn-logout" (click)="logout()">
      <i class="fas fa-sign-out-alt"></i>
      Logout
    </button>
  </div>
</aside>
