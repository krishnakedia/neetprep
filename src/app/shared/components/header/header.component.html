<header class="public-header">
    <div class="header-container">
      <a routerLink="/questions" class="logo">
        <i class="fas fa-graduation-cap"></i>
        <span>Gyan Vikash</span>
      </a>
      <nav class="header-nav">
        <a routerLink="/questions" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Practice</a>
        <!-- <a routerLink="/questions/practice" routerLinkActive="active">Questions</a> -->
        <a routerLink="/user" routerLinkActive="active">Mock Tests</a>
      </nav>
      <div class="user-menu" *ngIf="currentUser">
        <div class="user-info">
          <span class="user-name">{{ currentUser.name }}</span>
          <span class="user-email">{{ currentUser.email }}</span>
        </div>
        <button class="btn btn-outline btn-sm" (click)="logout()">Logout</button>
      </div>
      <a *ngIf="!currentUser" routerLink="/login" class="btn btn-primary btn-sm">Login</a>
    </div>
  </header>
