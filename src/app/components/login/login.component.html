<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <h1>Gyan Vikash</h1>
      <p>Online Examination Portal</p>
    </div>        
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input 
            type="email" 
            class="input" 
            [(ngModel)]="email" 
            name="email" 
            placeholder="Enter your email"
            required
          >
        </div>
      </div>          
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            class="input" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="Enter your password"
            required
          >
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
            <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword" style="left: -5px;"></i>
          </button>
        </div>
      </div>
      
      <div *ngIf="error" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg w-full" [disabled]="loading">
        <i class="fas" [class.fa-spinner]="loading" [class.fa-sign-in-alt]="!loading"></i>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
  
  <div class="login-footer">
    <p>Gyan Vikash &copy; 2024 - All Rights Reserved</p>
  </div>
</div>
